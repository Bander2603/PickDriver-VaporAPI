<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PickDriver - Reset Password</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #22c55e;
        --error: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 60%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 520px;
        background: var(--card);
        border: 1px solid #1f2937;
        border-radius: 14px;
        padding: 24px;
      }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0 0 18px; color: var(--muted); line-height: 1.5; }
      label { display: block; margin: 0 0 6px; font-size: 14px; }
      input {
        width: 100%;
        margin-bottom: 14px;
        border: 1px solid #334155;
        background: #0b1220;
        color: var(--text);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 15px;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 8px;
        padding: 11px 12px;
        background: var(--accent);
        color: #04120a;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: wait; }
      .msg { margin-top: 14px; font-size: 14px; }
      .ok { color: var(--accent); }
      .error { color: var(--error); }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Reset Password</h1>
      <p>Set a new password for your PickDriver account.</p>

      <form id="form">
        <label for="newPassword">New password</label>
        <input id="newPassword" type="password" minlength="8" required />

        <label for="confirmPassword">Confirm new password</label>
        <input id="confirmPassword" type="password" minlength="8" required />

        <button id="submit" type="submit">Update password</button>
      </form>

      <div id="msg" class="msg"></div>
    </main>

    <script>
      const API_BASE = "https://api.pickdriver.cc";

      const form = document.getElementById("form");
      const submit = document.getElementById("submit");
      const msg = document.getElementById("msg");

      const query = new URLSearchParams(window.location.search);
      const token = query.get("token");

      function setMessage(text, isError) {
        msg.textContent = text;
        msg.className = `msg ${isError ? "error" : "ok"}`;
      }

      if (!token) {
        setMessage("Missing reset token. Request a new password reset email.", true);
        submit.disabled = true;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (newPassword.length < 8) {
          setMessage("Password must be at least 8 characters.", true);
          return;
        }
        if (newPassword !== confirmPassword) {
          setMessage("Passwords do not match.", true);
          return;
        }

        submit.disabled = true;
        setMessage("Updating password...", false);

        try {
          const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ token, newPassword })
          });

          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            const reason = data.reason || "Unable to reset password.";
            throw new Error(reason);
          }

          setMessage("Password updated successfully. You can return to the app and sign in.", false);
          form.reset();
        } catch (error) {
          setMessage(error.message || "Unable to reset password.", true);
        } finally {
          submit.disabled = false;
        }
      });
    </script>
  </body>
</html>
