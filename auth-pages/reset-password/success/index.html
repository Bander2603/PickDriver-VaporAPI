<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PickDriver - Password Updated</title>
    <style>
      :root {
        --pd-bg: #0b0d12;
        --pd-surface: #151a24;
        --pd-text: #f2f4f8;
        --pd-muted: #9aa3b2;
        --pd-border: #2a3140;
        --pd-accent: #e10600;
        --pd-accent-strong: #ff3b2f;
        --pd-success: #38d27f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        font-family: "Bahnschrift", "Franklin Gothic Medium", "Segoe UI", sans-serif;
        color: var(--pd-text);
      }

      body {
        padding: 20px;
        display: grid;
        place-items: center;
        background-color: var(--pd-bg);
        background-image:
          radial-gradient(900px circle at 15% 10%, rgba(225, 6, 0, 0.18), transparent 60%),
          radial-gradient(700px circle at 85% 20%, rgba(74, 110, 255, 0.14), transparent 65%),
          repeating-linear-gradient(
            120deg,
            rgba(255, 255, 255, 0.04) 0,
            rgba(255, 255, 255, 0.04) 1px,
            transparent 1px,
            transparent 14px
          ),
          linear-gradient(150deg, #0b0d12 0%, #111826 55%, #0b0d12 100%);
      }

      .status-card {
        width: min(100%, 560px);
        background: linear-gradient(180deg, rgba(21, 26, 36, 0.98) 0%, rgba(20, 24, 34, 0.95) 100%);
        border: 1px solid var(--pd-border);
        border-radius: 16px;
        padding: 28px;
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      }

      .brand {
        margin: 0 0 18px;
        font-size: 0.72rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--pd-muted);
      }

      h1 {
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: clamp(1.45rem, 4vw, 1.95rem);
      }

      .detail {
        margin: 10px 0 0;
        color: var(--pd-muted);
        line-height: 1.5;
      }

      .status {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(56, 210, 127, 0.35);
        color: var(--pd-success);
        background: rgba(56, 210, 127, 0.08);
        font-size: 0.95rem;
        line-height: 1.45;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }

      .cta {
        margin-top: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        text-transform: uppercase;
        letter-spacing: 0.11em;
        font-weight: 700;
        text-decoration: none;
        color: #fff;
        background: linear-gradient(120deg, var(--pd-accent), var(--pd-accent-strong));
        box-shadow: 0 10px 22px rgba(225, 6, 0, 0.28);
      }

      .cta:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 28px rgba(225, 6, 0, 0.36);
      }
    </style>
  </head>
  <body>
    <main class="status-card">
      <p class="brand">PickDriver</p>
      <h1 id="pageTitle">Password updated</h1>
      <p class="detail" id="detail">Your new password is saved and the recovery link is now invalid.</p>
      <div class="status" id="status">Change completed</div>
      <a class="cta" id="cta" href="https://pickdriver.cc/login">Go to web login</a>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const queryLanguage = params.get("lang");
      const DEFAULT_LANGUAGE = "en";

      const pageTitle = document.getElementById("pageTitle");
      const detail = document.getElementById("detail");
      const status = document.getElementById("status");
      const cta = document.getElementById("cta");

      const messages = {
        en: {
          documentTitle: "PickDriver - Password Updated",
          pageTitle: "Password updated",
          detail: "Your new password is saved and the recovery link is now invalid.",
          status: "Change completed",
          cta: "Go to web login"
        },
        es: {
          documentTitle: "PickDriver - Password Actualizada",
          pageTitle: "Password actualizada",
          detail: "La nueva password ya esta guardada y el enlace de recuperacion ha quedado invalidado.",
          status: "Cambio completado",
          cta: "Ir al login web"
        }
      };

      function getSupportedLanguage(value) {
        if (!value) {
          return null;
        }

        const normalized = value.trim().toLowerCase();
        if (!normalized) {
          return null;
        }

        if (normalized.startsWith("es")) {
          return "es";
        }

        if (normalized.startsWith("en")) {
          return "en";
        }

        return null;
      }

      function resolveLanguage() {
        const queryValue = getSupportedLanguage(queryLanguage);
        if (queryValue) {
          return queryValue;
        }

        if (Array.isArray(navigator.languages)) {
          for (const lang of navigator.languages) {
            const supported = getSupportedLanguage(lang);
            if (supported) {
              return supported;
            }
          }
        }

        return getSupportedLanguage(navigator.language) || DEFAULT_LANGUAGE;
      }

      const language = resolveLanguage();
      const t = messages[language] || messages[DEFAULT_LANGUAGE];
      document.documentElement.lang = language;
      document.title = t.documentTitle;
      pageTitle.textContent = t.pageTitle;
      detail.textContent = t.detail;
      status.textContent = t.status;
      cta.textContent = t.cta;
    </script>
  </body>
</html>
