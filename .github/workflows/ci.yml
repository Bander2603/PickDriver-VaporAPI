name: CI

on:
  pull_request:
  push:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: swift:6.2.3-jammy

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pickdriver_test
          POSTGRES_USER: pickdriver
          POSTGRES_PASSWORD: pickdriver
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pickdriver -d pickdriver_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: pickdriver_test
      DATABASE_USERNAME: pickdriver
      DATABASE_PASSWORD: pickdriver
      JWT_SECRET: test_secret
      JWT_EXPIRES_IN_SECONDS: "604800"

    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks
        run: |
          set -eu
          TMPDIR=$(mktemp -d)
          TAG="v8.30.0"
          ASSET="gitleaks_8.30.0_linux_x64.tar.gz"
          URL="https://github.com/gitleaks/gitleaks/releases/download/${TAG}/${ASSET}"
          curl -L "$URL" -o "$TMPDIR/gitleaks.tar.gz"
          tar -xzf "$TMPDIR/gitleaks.tar.gz" -C "$TMPDIR"
          "$TMPDIR/gitleaks" detect -s . -v --config .gitleaks.toml

      - name: Build
        run: swift build -c debug

      - name: Install PostgreSQL client
        run: |
          if [ "$(id -u)" -eq 0 ]; then
            apt-get update
            apt-get install -y postgresql-client
          else
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi

      - name: Enable pg_trgm
        run: |
          psql "postgresql://pickdriver:pickdriver@postgres:5432/pickdriver_test" \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Test
        run: swift test
